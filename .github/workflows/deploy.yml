name: Deploy to Google Cloud Run

# バックエンド (Cloud Run) に関係するファイルが main に入ったときだけデプロイする。
# テスト / ドキュメント / frontend のみの変更ではフルデプロイを走らせない (A: パスフィルタ)。
on:
  push:
    branches:
      - main
    paths:
      - "cat_breeding_simulator/**"
      - "main.py"
      - "requirements.txt"
      - "Dockerfile"
      - "docs/architecture/*.csv" # イメージへ同梱するマスタCSV
      - ".github/workflows/deploy.yml"

# Workload Identity Federation を使用するための権限設定
permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT_ID: "cats-breeding-sim-31749"
  GCP_REGION: "asia-northeast1"
  GCP_REPOSITORY: "cats-simulator-repo"
  GCP_SERVICE_NAME: "cats-breeding-simulator"
  WORKLOAD_IDENTITY_PROVIDER: "projects/121657084520/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider"
  SERVICE_ACCOUNT_EMAIL: "github-actions-deployer@cats-breeding-sim-31749.iam.gserviceaccount.com"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. コードのチェックアウト
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Workload Identity Federation を使用した GCP 認証 (access_token を後続の docker login に使う)
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT_EMAIL }}

      # 3. Buildx をセットアップ (gha レイヤキャッシュを使うため / B: ビルドキャッシュ)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Artifact Registry へ Docker ログイン (access_token を利用)
      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # 5. ビルド & プッシュ (gha キャッシュで pip 層を再利用 → requirements 不変なら高速)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/${{ env.GCP_SERVICE_NAME }}:${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/${{ env.GCP_SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Cloud Run へのデプロイ
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.GCP_SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_REPOSITORY }}/${{ env.GCP_SERVICE_NAME }}:${{ github.sha }}
          flags: "--platform managed --allow-unauthenticated"
          # フィードバックメール (Resend) 用。GitHub Secrets 未登録なら空 = 送信せず受付のみ
          # (バックエンドが sent=false を返す)。送信元 EMAIL_FROM / 表示名はコード既定値を使う
          # (noreply@nekoya.co.jp / 猫毛色シミュレーター)。既定と異なる送信元なら EMAIL_FROM 行を追加。
          env_vars: |
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}

      # 7. デプロイされたURLの出力
      - name: Show Cloud Run URL
        run: |
          echo "Cloud Run Service URL: ${{ steps.deploy.outputs.url }}"
